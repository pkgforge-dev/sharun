name: CI

on:
  push:
    branches:
    - main
    paths-ignore:
    - '**/*.md'
  workflow_dispatch:

jobs:
  build_and_release:
    name: sharun
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
          target: x86_64-unknown-linux-musl

      - name: Install deps
        run: |
          sudo apt update && sudo apt install binutils qemu-user-static -y
          rustup component add rust-src --toolchain nightly
          cargo install cross

      - name: Build x86_64
        run: |
          cargo clean
          cargo build --release
          mv target/x86_64-unknown-linux-musl/release/sharun sharun-x86_64

      - name: Build aarch64
        run: |
          cargo clean
          cross build --release --target aarch64-unknown-linux-musl
          mv target/aarch64-unknown-linux-musl/release/sharun sharun-aarch64

      - name: Strip
        run: |
          (git clone https://github.com/aunali1/super-strip.git && cd super-strip
          make
          sudo mv -fv sstrip /usr/bin/)
          sstrip sharun-*

      - name: AIO sharun x86_64
        run: |
          docker run --rm -v "${{ github.workspace }}:/root" -w /root --platform=linux/amd64 alpine:latest /root/.github/create_aio_sharun.sh

      - name: AIO sharun aarch64
        run: |
          docker run --rm -v "${{ github.workspace }}:/root" -w /root --platform=linux/arm64 alpine:latest /root/.github/create_aio_sharun.sh

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          name: "continuous"
          tag_name: "continuous"
          files: sharun-*
