name: CI

on:
  workflow_dispatch:

jobs:
  build_and_release:
    name: sharun
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
          target: x86_64-unknown-linux-musl

      - name: Install deps
        run: |
          sudo apt update && sudo apt install binutils qemu-user-static -y
          rustup component add rust-src --toolchain nightly
          cargo install cross

      - name: Build x86_64
        run: |
          cargo clean
          cargo build --release
          mv target/x86_64-unknown-linux-musl/release/sharun sharun-x86_64

      - name: Build aarch64
        run: |
          cargo clean
          cross build --release --target aarch64-unknown-linux-musl
          mv target/aarch64-unknown-linux-musl/release/sharun sharun-aarch64

      - name: Strip
        run: |
          (git clone https://github.com/aunali1/super-strip.git && cd super-strip
          make
          sudo mv -fv sstrip /usr/bin/)
          sstrip sharun-*

      - name: Get version
        run: |
          cp sharun-x86_64 sharun
          chmod +x ./sharun
          echo "VERSION=$(./sharun --version | awk '{print $NF}')" >> "${GITHUB_ENV}"

      - name: Check tag doesn't exist
        run: |
          if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q "$VERSION"; then
            echo "Error: tag $VERSION already exists. Bump the version in Cargo.toml first."
            exit 1
          fi

      - name: Draft Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ env.VERSION }}"
          tag_name: "${{ env.VERSION }}"
          prerelease: false
          draft: true
          generate_release_notes: true
          make_latest: true
          files: sharun-*
